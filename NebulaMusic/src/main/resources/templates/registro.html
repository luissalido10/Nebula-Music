<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="../static/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            
            <!-- TAREA PARA EL ALUMNO:
                 Crea un formulario que envíe los datos mediante POST a "/crear-cuenta".
                 Debe contener campos para:
                 - Nombre completo (texto)
                 - Correo electrónico (email)
                 - Contraseña (password)
                 - Pseudónimo (texto con patrón de validación: [letras de 3 a 10]-[números de 2 a 10])
                 - Género (radio buttons: Femenino, Masculino, Otro)
                 - Tipo de Suscripción (select: Gratis, Premium Mensual, Premium Anual)
                 - Fecha de nacimiento (date)
                 - Aceptar términos y condiciones (checkbox)
                 - Comentarios adicionales o gustos (textarea)
            -->
            <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
                <h2>Crear Cuenta</h2>
                <div>
                    <lab for="nombre">nombre completo:</lab>
                    <input type="text" id="nombre" name="nombre" placeholder="ej. Luis salido" required minlength="10" maxlength="150">
                </div>
                <div>
                    <label for="correo">Correo Electronico:</label>
                    <input type="email" id="correo" name="correo" placeholder="luissalido@gmail.com" required >
                </div>
                <div>
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password" id="contrasenia" name="contrasenia" placeholder="Minimo 8 caracteres" required minlength="8">
                </div>
                <div>
                    <label for="txt_pseudonimo">Pseudonimo:</label>
                    <input type="text" id="txt_pseudonimo" name="txt_pseudonimo" required placeholder="Nebula-2025" pattern="[a-zA-Z][3,10}--[0-9]{2,10}">
                </div>
                <div>
                    <label>Genero:</label>
                    <div>
                        <input type="radio" id="rad_femenino" name="rad_genero" value="femenino" required>
                        <label for="rad_femenino">Femenino</label>
                        <input type="radio" id="rad_masculino" name="rad_genero" value="masculino" required>
                        <label for="rad_masculino" r>Masculino</label>
                        <input type="radio" id="rad_otro" name="rad_genero" value="otro" required>
                        <label for="rad_otro">Otro / prefiero no decirlo</label>
                    </div>
                </div>
                <div>
                    <label for="sel_suscripcion">Tipo suscripcion</label>
                    <select id="sel_suscripcion" name="sel_suscripcion" required>
                       <option value="">Selecciona una opcion</option>
                        <option value="gratis">Gratis</option>
                        <option value="premium_mensual">Premium mensual ($99/mes)</option>
                        <option value="premium_anual">Premium anual ($899/mes)</option>
                    </select>
                </div>
                <div>
                    <label for="fechaNacimiento">Fecha nacimiento:</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>
                <div>
                    <label for="comentarios">Comentarios o gustos:</label>
                    <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="cuentas que musica te gusta"></textarea>
                </div>
                <div>
                    <input type="checkbox" id="terminos" name="chk_terminos" value="aceptado" required>
                    <label>Acepto los terminos y condiciones</label>
                </div>
                <div>
                    <button type="submit">Crear una cuenta</button>
                    <button type="reset">Limpiar el Fomrulario</button>
                </div>

            </form>

            <p>¿ya tienes una cuenta?</p><a href="iniciar-sesion.html">Iniciar sesion aqui</a>

        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
